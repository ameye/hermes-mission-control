services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-mission-control
    restart: unless-stopped
    ports:
      - "2800:2800"
    volumes:
      - hermes-home:/data/hermes:ro
    environment:
      - HERMES_HOME=/data/hermes
      - PORT=2800
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request,os; urllib.request.urlopen('http://localhost:'+os.environ.get('PORT','2800')+'/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
