services:
  mission-control:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hermes-mission-control
    restart: unless-stopped
    ports:
      - "2800:2800"
    volumes:
      - hermes-live-data:/data/hermes:ro
    environment:
      - HERMES_HOME=/data/hermes
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:2800/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 3s

volumes:
  hermes-live-data:
    external: true
